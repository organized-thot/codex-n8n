services:
  n8n-ts:
    image: tailscale/tailscale:latest
    container_name: compose-n8n-ts
    hostname: compose-n8n
    restart: unless-stopped
    environment:
      - TS_HOSTNAME=n8n
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
    volumes:
      - ts_n8n_state:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

  n8n:
    image: n8nio/n8n:latest
    container_name: compose-n8n-n8n
    restart: unless-stopped
    depends_on:
      - n8n-ts
    network_mode: "service:n8n-ts"
    environment:
      - N8N_HOST=${N8N_SUBDOMAIN}.${TAILNET_DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://${N8N_SUBDOMAIN}.${TAILNET_DOMAIN}
      - WEBHOOK_URL=https://${N8N_SUBDOMAIN}.${TAILNET_DOMAIN}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_SECURE_COOKIE=true
      - N8N_ALLOW_EXTERNAL=fs,path
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=*
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  ts_n8n_state:
  n8n_data:
